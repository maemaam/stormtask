<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Original PDF — Handwritten Working Notes</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0F1117;
      --panel: #171B26;
      --panel-border: #272D42;
      --text: #FFFFFF;
      --muted: #9EA6B8;
      --accent: #4F7FFF;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--panel);
      border-bottom: 1px solid var(--panel-border);
      position: sticky;
      top: 0;
      z-index: 5;
    }

    .home-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      background: rgba(79, 127, 255, 0.12);
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
      transition: border-color 150ms ease, background-color 150ms ease;
    }

    .home-link:hover,
    .home-link:focus-visible {
      border-color: rgba(79, 127, 255, 0.72);
      background: rgba(79, 127, 255, 0.22);
      outline: none;
    }

    .home-link svg {
      width: 15px;
      height: 15px;
      flex: 0 0 auto;
    }

    .toolbar-title {
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }

    .pdf-frame-wrap {
      height: calc(100% - 49px);
    }

    embed,
    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .fallback {
      display: none;
      padding: 40px 20px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    .fallback a {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <a class="home-link" href="index.html" aria-label="Back to Handwritten Working Notes">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11.5 12 4l9 7.5"/><path d="M5 10v10h14V10"/></svg>
      Home
    </a>
    <span class="toolbar-title">Original PDF</span>
  </div>
  <div class="pdf-frame-wrap">
    <embed src="book-reference.pdf" type="application/pdf">
  </div>
  <div class="fallback">
    <p>Your browser can't display the PDF inline. <a href="book-reference.pdf">Open it directly</a> instead.</p>
  </div>
</body>
</html>
